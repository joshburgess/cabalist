  <!-- "CABALIST" text — shifted right for clearance from icon -->
  <text
    x="410"
    y="108"
    font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="62"
    font-weight="700"
    letter-spacing="8"
    text-anchor="middle"
    filter="url(#textShadow)"
  >
    <tspan fill="#e8e8e8">CABAL</tspan><tspan fill="#00B8EF">IST</tspan>
