# GHC Warning Flags Database
# Each entry documents a GHC warning flag with metadata.
#
# Fields:
#   flag             - The warning flag (e.g., "-Wfoo")
#   since            - The GHC version that introduced the flag
#   description      - A brief human-readable description
#   group            - Which warning groups include this flag (e.g., ["-Wall"])
#   recommended      - Whether cabalist recommends enabling this flag
#   recommended_for  - Optional list of contexts where this is recommended (e.g., ["ci"])

# ──────────────────────────────────────────────────────────────
# Meta / Group Flags
# ──────────────────────────────────────────────────────────────

[[warning]]
flag = "-Wall"
since = "6.8.1"
description = "Enable almost all warnings"
group = []
recommended = true

[[warning]]
flag = "-Wcompat"
since = "8.0.1"
description = "Enable warnings about future compatibility issues"
group = []
recommended = true

[[warning]]
flag = "-Weverything"
since = "8.0.1"
description = "Enable every single warning GHC supports (including noisy ones)"
group = []
recommended = false

[[warning]]
flag = "-Werror"
since = "6.8.1"
description = "Turn all warnings into errors"
group = []
recommended_for = ["ci"]

[[warning]]
flag = "-Wwarn"
since = "6.8.1"
description = "Make all warnings non-fatal (opposite of -Werror)"
group = []
recommended = false

