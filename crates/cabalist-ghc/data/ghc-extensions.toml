# GHC Language Extensions Database
# Each entry documents a GHC language extension with metadata.
#
# Fields:
#   name        - The extension name as used in {-# LANGUAGE ... #-} or .cabal files
#   since       - The GHC version that introduced the extension
#   description - A brief human-readable description
#   category    - Classification for grouping/filtering
#   safe        - Whether it's generally safe to enable project-wide
#   recommended - Whether cabalist recommends it as a default
#   warn        - Optional warning note for extensions with gotchas

# ──────────────────────────────────────────────────────────────
# Strings & Overloading
# ──────────────────────────────────────────────────────────────

[[extension]]
name = "OverloadedStrings"
since = "6.8.1"
description = "String literals are polymorphic over IsString, allowing Text and ByteString literals"
category = "strings"
safe = true
recommended = true

[[extension]]
name = "OverloadedLabels"
since = "8.0.1"
description = "Enable the #label syntax for overloaded labels via the IsLabel class"
category = "strings"
safe = true
recommended = false

[[extension]]
name = "OverloadedLists"
since = "7.8.1"
description = "List literals are polymorphic over IsList, allowing Vector and Map literals"
category = "strings"
safe = true
recommended = false
warn = "Can make type inference less predictable for list expressions"

[[extension]]
name = "OverloadedRecordDot"
since = "9.2.1"
description = "Access record fields with dot syntax: record.field"
category = "records"
safe = true
recommended = false

[[extension]]
name = "OverloadedRecordUpdate"
since = "9.2.1"
description = "Update record fields with dot syntax: record { field = value }"
category = "records"
safe = false
recommended = false
warn = "Experimental; may change in future GHC versions"

