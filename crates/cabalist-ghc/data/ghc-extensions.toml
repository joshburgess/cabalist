name = "MonadFailDesugaring"
since = "8.0.1"
description = "Desugar failed pattern matches in do blocks to MonadFail.fail instead of Monad.fail"
category = "syntax"
safe = true
recommended = false

[[extension]]
name = "RebindableSyntax"
since = "7.0.1"
description = "Desugar do-notation, if-then-else, and literals using in-scope names instead of Prelude"
category = "syntax"
safe = false
recommended = false
warn = "Disables implicit Prelude and changes desugaring of basic syntax; very invasive"

[[extension]]
name = "IncoherentInstances"
since = "6.8.1"
description = "Allow GHC to pick an arbitrary instance when multiple overlap"
category = "types"
safe = false
recommended = false
warn = "Can lead to unpredictable instance selection; almost never the right choice"

[[extension]]
name = "OverlappingInstances"
since = "6.8.1"
description = "Allow overlapping instance declarations"
category = "types"
safe = false
recommended = false
warn = "Can lead to surprising instance selection; prefer per-instance OVERLAPPING pragmas"

[[extension]]
name = "LexicalNegation"
since = "9.0.1"
description = "Use whitespace to disambiguate negation from subtraction"
category = "syntax"
safe = true
recommended = false

[[extension]]
name = "RecordPuns"
since = "6.10.1"
description = "Synonym for NamedFieldPuns"
category = "records"
safe = true
recommended = false
