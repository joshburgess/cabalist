name: Publish

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Run tests before publishing
        run: cargo test --workspace

      # Publish in dependency order: leaf crates first.
      - name: Publish cabalist-parser
        run: cargo publish -p cabalist-parser --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Publish cabalist-ghc
        run: cargo publish -p cabalist-ghc --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Publish cabalist-hackage
        run: cargo publish -p cabalist-hackage --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Publish cabalist-project
        run: cargo publish -p cabalist-project --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Publish cabalist-opinions
        run: cargo publish -p cabalist-opinions --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

  publish-vscode:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest
    needs: publish-crates
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        if: env.VSCE_TOKEN != ''
        run: npx @vscode/vsce publish --no-dependencies -p ${{ secrets.VSCE_TOKEN }}
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: cabalist-vscode
          path: editors/vscode/*.vsix

  build-binaries:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cabalist-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            cabalist cabalist-cli cabalist-lsp

      - name: Package binaries (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../cabalist-${{ github.ref_name }}-${{ matrix.target }}.zip `
            cabalist.exe cabalist-cli.exe cabalist-lsp.exe

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: cabalist-${{ matrix.target }}
          path: cabalist-${{ github.ref_name }}-${{ matrix.target }}.*

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, publish-vscode]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/cabalist-x86_64-unknown-linux-gnu/*
            artifacts/cabalist-x86_64-apple-darwin/*
            artifacts/cabalist-aarch64-apple-darwin/*
            artifacts/cabalist-x86_64-pc-windows-msvc/*
            artifacts/cabalist-vscode/*.vsix
