name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cabalist dist/ || true
          cp target/${{ matrix.target }}/release/cabalist-cli dist/ || true
          cd dist
          tar czf ../cabalist-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/cabalist.exe" -Destination "dist/" -ErrorAction SilentlyContinue
          Copy-Item "target/${{ matrix.target }}/release/cabalist-cli.exe" -Destination "dist/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "dist/*" -DestinationPath "cabalist-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Generate checksums (Unix)
        if: runner.os != 'Windows'
        run: sha256sum cabalist-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > cabalist-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "cabalist-${{ github.ref_name }}-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  cabalist-${{ github.ref_name }}-${{ matrix.target }}.zip" | Out-File -Encoding ascii "cabalist-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-${{ matrix.target }}.spdx.json
          output-file: cabalist-${{ github.ref_name }}-${{ matrix.target }}.sbom.spdx.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cabalist-${{ matrix.target }}
          path: |
            cabalist-*.tar.gz
            cabalist-*.zip
            cabalist-*.sha256
            cabalist-*.sbom.spdx.json

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        run: |
          for file in artifacts/**/*.tar.gz artifacts/**/*.zip; do
            [ -f "$file" ] && cosign sign-blob --yes --output-signature "${file}.sig" --output-certificate "${file}.pem" "$file"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
            artifacts/**/*.sbom.spdx.json
            artifacts/**/*.sig
            artifacts/**/*.pem
