name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify tag and run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches workspace version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
          echo "tag: $TAG_VERSION, Cargo.toml: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match workspace version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Run tests
        run: cargo test --workspace

  publish-crates:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish all crates in dependency order
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          no-verify: false
          ignore-unpublished-changes: true

  generate-docs:
    name: Generate completions and man pages
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build cabalist-cli
        run: cargo build --release --bin cabalist-cli

      - name: Generate artifacts
        run: |
          mkdir -p docs/completions docs/man
          for shell in bash zsh fish; do
            ./target/release/cabalist-cli completions "$shell" > "docs/completions/cabalist-cli.$shell"
          done
          ./target/release/cabalist-cli manpages docs/man

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: shell-docs
          path: docs

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: [verify, generate-docs]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bins

      - name: Download completions and man pages
        uses: actions/download-artifact@v4
        with:
          name: shell-docs
          path: shell-docs

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cabalist dist/ || true
          cp target/${{ matrix.target }}/release/cabalist-cli dist/ || true
          cp target/${{ matrix.target }}/release/cabalist-lsp dist/ || true
          cp -r shell-docs/completions dist/
          cp -r shell-docs/man dist/
          cd dist
          tar czf ../cabalist-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/cabalist.exe" -Destination "dist/" -ErrorAction SilentlyContinue
          Copy-Item "target/${{ matrix.target }}/release/cabalist-cli.exe" -Destination "dist/" -ErrorAction SilentlyContinue
          Copy-Item "target/${{ matrix.target }}/release/cabalist-lsp.exe" -Destination "dist/" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "shell-docs/completions" -Destination "dist/"
          Copy-Item -Recurse "shell-docs/man" -Destination "dist/"
          Compress-Archive -Path "dist/*" -DestinationPath "cabalist-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Generate checksums (Unix)
        if: runner.os != 'Windows'
        run: sha256sum cabalist-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > cabalist-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "cabalist-${{ github.ref_name }}-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  cabalist-${{ github.ref_name }}-${{ matrix.target }}.zip" | Out-File -Encoding ascii "cabalist-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: cabalist-${{ github.ref_name }}-${{ matrix.target }}.sbom.spdx.json
          output-file: cabalist-${{ github.ref_name }}-${{ matrix.target }}.sbom.spdx.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cabalist-${{ matrix.target }}
          path: |
            cabalist-*.tar.gz
            cabalist-*.zip
            cabalist-*.sha256
            cabalist-*.sbom.spdx.json

  package-vscode:
    name: Package VS Code Extension
    needs: verify
    runs-on: ubuntu-latest
    env:
      VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        if: env.VSCE_TOKEN != ''
        run: npx @vscode/vsce publish --no-dependencies -p "$VSCE_TOKEN"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: cabalist-vscode
          path: editors/vscode/*.vsix

  release:
    name: Create GitHub Release
    needs: [build-binaries, package-vscode]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        run: |
          for file in artifacts/**/*.tar.gz artifacts/**/*.zip; do
            [ -f "$file" ] && cosign sign-blob --yes \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.pem" \
              "$file"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
            artifacts/**/*.sbom.spdx.json
            artifacts/**/*.sig
            artifacts/**/*.pem
            artifacts/cabalist-vscode/*.vsix
